<!doctype html> 
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <title>Dog Model</title>

  <!-- model-viewer -->
  <script async src="https://ga.jspm.io/npm:es-module-shims@1.7.1/dist/es-module-shims.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@^0.172.0/build/three.module.min.js"
    }
  }
  </script>

  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer-module.min.js"></script>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer-effects/dist/model-viewer-effects.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f7;
      overflow: hidden;
      touch-action: pan-y pinch-zoom;
    }

    #controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: rgba(255, 255, 255, 0.95);
      padding: 12px 20px;
      border-radius: 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      backdrop-filter: blur(5px);
      border: 1px solid #e0e0e0;
      display: flex;
      gap: 10px;
      max-width: 90vw;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: none;
    }

    #controls::-webkit-scrollbar {
      display: none;
    }

    button {
      padding: 10px 18px;
      cursor: pointer;
      background: #ffffff;
      color: #333;
      border: 1px solid #ddd;
      border-radius: 30px;
      font-weight: bold;
      font-size: 14px;
      transition: all 0.2s;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      white-space: nowrap;
      flex-shrink: 0;
      touch-action: manipulation;
    }

    button:active {
      background: #f0f0f0;
      transform: scale(0.95);
    }

    button.active {
      background: #ff5500;
      color: white;
      border-color: #ff5500;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: #ffffff;
    }
  </style>
</head>

<body>

<div id="controls">
  <button id="btn1">🐶 Анимация 1</button>
  <button id="btn2">🏃 Анимация 2</button>
  <button id="outlineBtn">✨ Контур</button>
  <button id="pixelBtn">🔳 Пикселизация</button>
</div>

<model-viewer
  id="mv"
  src="dog3.glb"
  camera-controls
  autoplay
  animation-crossfade-duration="300"
  shadow-intensity="1"
  exposure="1"
  camera-orbit="0deg 75deg 3m"
  min-camera-orbit="auto auto 1.5m"
  max-camera-orbit="auto auto 6m"
  interaction-prompt="none"
>

  <effect-composer>
    <outline-effect id="outlineEffect" color="orange" blend-mode="skip"></outline-effect>
    <pixelate-effect id="pixelEffect" granularity="15" blend-mode="skip"></pixelate-effect>
  </effect-composer>

</model-viewer>

<script>
(() => {
  const mv = document.getElementById('mv');
  const btn1 = document.getElementById('btn1');
  const btn2 = document.getElementById('btn2');
  const outlineBtn = document.getElementById('outlineBtn');
  const pixelBtn = document.getElementById('pixelBtn');

  const outlineEffect = document.getElementById('outlineEffect');
  const pixelEffect = document.getElementById('pixelEffect');

  let animations = [];
  let isOutlineActive = false;
  let isPixelActive = false;

  mv.addEventListener('load', () => {
    animations = mv.availableAnimations;
    console.log("Найденные анимации:", animations);
  });

  btn1.addEventListener('click', () => {
    if (animations.length > 0) {
      mv.animationName = animations[0];
      mv.play();
    }
  });

  btn2.addEventListener('click', () => {
    if (animations.length > 1) {
      mv.animationName = animations[1];
      mv.play();
    }
  });

  outlineBtn.addEventListener('click', () => {
    isOutlineActive = !isOutlineActive;
    outlineEffect.setAttribute("blend-mode", isOutlineActive ? "normal" : "skip");
    outlineBtn.classList.toggle("active", isOutlineActive);
  });

  pixelBtn.addEventListener('click', () => {
    isPixelActive = !isPixelActive;
    pixelEffect.setAttribute("blend-mode", isPixelActive ? "normal" : "skip");
    pixelBtn.classList.toggle("active", isPixelActive);
  });

})();
</script>

</body>
</html>
